<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters — Megha ERP</title>
<link rel="stylesheet" href="megha-ui.css">
<style>
  .seclbl{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .tile{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 14px;text-decoration:none;color:var(--ink);box-shadow:0 1px 2px rgba(31,39,51,.04);transition:.14s}
  .tile:hover{border-color:var(--blue);transform:translateY(-1px)}
  .tile .ti{width:38px;height:38px;border-radius:10px;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .tile .tt{font-size:.88rem;font-weight:600}
  .tile .ts{font-size:.74rem;color:var(--muted);margin-top:1px}
</style>
</head>
<body>
<div class="topbar">
  <a class="tb-grid" href="home.html" style="text-decoration:none" title="Home">▦</a>
  <div class="brand"><b>Megha</b><span>ERP</span></div>
  <div class="tabs"><div class="tab active"><span class="ic">▦</span> Masters <span class="x">✕</span></div></div>
  <div class="tb-spacer"></div>
  <div class="tb-ico">⋯</div>
  <div class="tb-search">🔍 <span>Search</span> <kbd>⌘K</kbd></div>
  <div class="tb-ico">💎</div><div class="tb-ico">?</div><div class="tb-ico">✉</div>
  <div class="avatar">SA</div>
</div>

<div class="crumb">Megha ERP <span class="sep">›</span> <span class="cur">Masters</span></div>

<div class="page">
  <div class="page-head">
    <div class="ph-icon">📇</div>
    <h1>Masters</h1>
    <div class="spacer"></div>
  </div>
  <div id="groups"></div>
</div>

<div class="statusbar">
  <div class="s">💠 <b>Megha ERP</b></div><div class="s">👤 SUPER_ADMIN</div>
  <div class="s">🏢 Donda Exports</div><div class="s"><span class="dot"></span> Connected</div>
  <div class="spacer"></div><div class="s">v0.1.0 (Build #10)</div>
</div>

<script src="masters-data.js"></script>
<script>
document.getElementById('groups').innerHTML = MASTER_GROUPS.map(g => `
  <div class="seclbl">${g.icon} ${g.group}</div>
  <div class="tiles">
    ${g.masters.map(m => `
      <a class="tile" href="m-${m.key}.html">
        <div class="ti">${m.icon}</div>
        <div><div class="tt">${m.title}</div><div class="ts">${m.rows.length} records</div></div>
      </a>`).join('')}
  </div>`).join('');
</script>
</body>
</html>
